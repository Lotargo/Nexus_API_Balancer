server:
  host: 127.0.0.1
  port: 3000
auth:
  enabled: true
  public_registration: false
  master_key: nexus-master-key-2024
  secret: your-secure-jwt-secret
  issuer: nexus-balancer
  audience: api-clients
pools:
- name: openai-pool
  description: Mock OpenAI Pool
  provider: openai
  target_url: http://127.0.0.1:8085
  capacity: 10
  keys:
  - id: OPENAI_MOCK
    limit: 100
    concurrency: 5
    secret_name: openai_mock_key
    secret_type: api_key
  - id: DYNAMIC_KEY
    limit: 100
    concurrency: 1
    secret_name: dynamic_secret_file
    secret_type: api_key
  - id: MCP_DYNAMIC_KEY
    limit: 500
    concurrency: 3
    secret_name: mcp_secret_file
    secret_type: api_key
- name: gemini-pool
  description: Mock Gemini Pool
  provider: google
  target_url: http://127.0.0.1:8085/google
  capacity: 10
  keys:
  - id: GEMINI_MOCK
    limit: 100
    concurrency: 5
    secret_name: gemini_mock_key
    secret_type: api_key
- name: anthropic-pool
  description: Mock Anthropic Pool
  provider: anthropic
  target_url: http://127.0.0.1:8085/anthropic
  capacity: 10
  keys:
  - id: ANTHROPIC_MOCK
    limit: 100
    concurrency: 5
    secret_name: anthropic_mock_key
    secret_type: api_key
