server:
  host: "127.0.0.1"
  port: 8080

auth:
  enabled: true
  secret: "my-very-secure-shared-secret-for-jwt"
  issuer: "nexus-balancer"
  audience: "api-clients"

pools:
  - name: "primary"
    description: "Main search pool for high-priority AI queries"
    capacity: 20
    keys:
      - id: "ORG_A_Tier_1"
        limit: 2
        concurrency: 5
        secret_name: "org_a_api_key"
        secret_type: "api_key"
      - id: "ORG_B_Tier_2"
        limit: 5
        concurrency: 5
        secret_name: "org_b_api_key"
        secret_type: "api_key"
      - id: "DB_WRITE_POOL"
        limit: 10
        concurrency: 2
        secret_name: "db_connection_string"
        secret_type: "connection_string"
