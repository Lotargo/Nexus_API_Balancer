server:
  host: 127.0.0.1
  port: 3000
auth:
  enabled: true
  public_registration: false
  master_key: nexus-master-key-2024
  secret: your-secure-jwt-secret
  issuer: nexus-balancer
  audience: api-clients
pools:
- name: openai-pool
  description: Mock OpenAI Pool
  provider: openai
  target_url: http://127.0.0.1:8085
  capacity: 20
  keys:
  - id: OPENAI_MOCK
    rps_limit: 100
    cooldown_on_limit: true
    concurrency: 5
    secret_name: openai_mock_key
    secret_type: api_key
- name: gemini-pool
  description: Mock Gemini Pool
  provider: google
  target_url: http://127.0.0.1:8085
  capacity: 20
  keys:
  - id: GEMINI_MOCK
    rps_limit: 100
    cooldown_on_limit: true
    concurrency: 5
    secret_name: gemini_mock_key
    secret_type: api_key
- name: anthropic-pool
  description: Mock Anthropic Pool
  provider: anthropic
  target_url: http://127.0.0.1:8085
  capacity: 20
  keys:
  - id: ANTHROPIC_MOCK
    rps_limit: 100
    cooldown_on_limit: true
    concurrency: 5
    secret_name: anthropic_mock_key
    secret_type: api_key
- name: limit-pool
  description: Pool for RPS testing
  provider: openai
  target_url: http://127.0.0.1:8085
  capacity: 5
  keys: []
- name: gemini-real
  description: Real Gemini Flash Lite
  provider: google
  target_url: https://generativelanguage.googleapis.com/v1beta
  capacity: 10
  keys:
  - id: GEMINI_REAL_KEY
    rps_limit: 10
    cooldown_on_limit: true
    concurrency: 2
    secret_name: gemini_real_key
    secret_type: api_key
